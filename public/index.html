<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Ecosystem Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid #334155;
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #475569;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--accent-blue);
        }

        .card.up::before { background-color: var(--accent-green); }
        .card.down::before { background-color: var(--accent-red); }

        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .service-name {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.up { background-color: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
        .status-badge.down { background-color: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
        .status-badge.unknown { background-color: rgba(148, 163, 184, 0.2); color: var(--text-secondary); }

        .detail {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .detail .label { color: var(--text-secondary); }
        .detail .value { font-family: monospace; }

        .footer {
            margin-top: auto;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .checking {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <header>
        <h1>Lab Monitor</h1>
        <p class="subtitle">Ecosistema de Microservicios</p>
    </header>

    <div class="grid" id="status-grid">
        <!-- Cards will be injected here -->
    </div>

    <div class="footer">
        Última actualización: <span id="last-update">-</span>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                renderCards(data);
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }

        function renderCards(services) {
            const grid = document.getElementById('status-grid');
            grid.innerHTML = services.map(s => `
                <div class="card ${s.status.toLowerCase()}">
                    <div class="service-header">
                        <div class="service-name">${s.name}</div>
                        <div class="status-badge ${s.status.toLowerCase()}">${s.status}</div>
                    </div>
                    <div class="detail">
                        <span class="label">URL:</span>
                        <span class="value" style="font-size: 0.7rem;">${s.url.replace('https://', '')}</span>
                    </div>
                    <div class="detail">
                        <span class="label">Latencia:</span>
                        <span class="value">${s.latency} ms</span>
                    </div>
                    <div class="detail">
                        <span class="label">Visto:</span>
                        <span class="value">${s.lastChecked ? new Date(s.lastChecked).toLocaleTimeString() : '-'}</span>
                    </div>
                </div>
            `).join('');
        }

        fetchStatus();
        setInterval(fetchStatus, 30000); // UI Refresh every 30s
    </script>
</body>
</html>
