name: Keep Monitor Alive

on:
  schedule:
    - cron: '*/14 * * * *' # Cada 14 minutos
  workflow_dispatch: # Permite ejecución manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Monitor Service
        run: |
          curl -I https://lab-monitor-service.onrender.com/api/status
